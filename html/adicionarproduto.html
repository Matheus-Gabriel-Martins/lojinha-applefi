<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adicionar Produto</title>

  <link rel="stylesheet" href="../css/lojinha_css.css">
</head>
<body>
    <a href="lojinha.html" class="btn-retorno"> Retornar </a>

  <main class="container" style="padding: 50px 20px;">
    <div class="modal-adicionar" style="margin: auto; display: flex;">

      <h3>Novo Produto</h3>

      <input type="text" id="nome-produto" placeholder="Nome do produto">

      <input type="text" id="sub-produto" placeholder="Descrição">

      <input type="number" id="valor-produto" placeholder="Preço">

      <input type="text" id="imagem-produto" placeholder="Link da imagem">

      <button id="btn-salvar-produto" class="btn-comprar">
        Salvar Produto
      </button>

    </div>
  </main>

  <script src="../js/adicionarproduto.js"></script>

</body>
</html>
